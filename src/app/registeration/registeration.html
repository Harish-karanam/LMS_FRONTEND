<div class="registration-control">
  <mat-card>

  <mat-card-header>
    <mat-card-title>User Registration</mat-card-title>
  </mat-card-header>

  <mat-card-content>

    <form>

      <mat-form-field appearance="outline">
        <mat-label>Employee Code</mat-label>
        <input
          matInput
          [(ngModel)]="registrationData.employeeCode"
          name="employeeCode">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>First Name</mat-label>
        <input
          matInput
          [(ngModel)]="registrationData.firstName"
          name="firstName">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Last Name</mat-label>
        <input
          matInput
          [(ngModel)]="registrationData.lastName"
          name="lastName">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input
          matInput
          type="email"
          [(ngModel)]="registrationData.email"
          name="email">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input
          matInput
          type="password"
          [(ngModel)]="registrationData.password"
          name="password">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Role Id</mat-label>
        <input
          matInput
          type="number"
          [(ngModel)]="registrationData.roleId"
          name="roleId">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Manager Id</mat-label>
        <input
          matInput
          type="number"
          [(ngModel)]="registrationData.managerId"
          name="managerId">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Department Id</mat-label>
        <input
          matInput
          type="number"
          [(ngModel)]="registrationData.departmentId"
          name="departmentId">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Project Id</mat-label>
        <input
          matInput
          type="number"
          [(ngModel)]="registrationData.projectId"
          name="projectId">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Joining Date</mat-label>
        <input
          matInput
          type="date"
          [(ngModel)]="registrationData.joiningDate"
          name="joiningDate">
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        type="button"
        (click)="register()">
        Register
      </button>

    </form>

  </mat-card-content>
   <div class="link-text">
    <p>
    Already have an account?
    <a routerLink="/login">Login here</a>
    </p>
  </div>

</mat-card>
</div>
