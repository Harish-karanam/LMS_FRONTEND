<mat-card>

  <mat-card-header>
    <mat-card-title>User Login</mat-card-title>
  </mat-card-header>

  <mat-card-content>

    <form>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input
          matInput
          type="email"
          [(ngModel)]="loginData.email"
          name="email">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input
          matInput
          type="password"
          [(ngModel)]="loginData.password"
          name="password">
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        type="button"
        (click)="login()">
        Login
      </button>

    </form>

  </mat-card-content>

</mat-card>
